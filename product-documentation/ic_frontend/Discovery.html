<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Discovery — Truleado</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  :root {
    --page-bg: #F4F6FA;
    --surface: #FFFFFF;
    --ink: #0F172A;
    --ink-2: #1E293B;
    --muted: #64748B;
    --muted-2: #94A3B8;
    --border: #E2E8F0;
    --border-soft: #EEF2F7;
    --primary: #2563EB;
    --primary-ink: #1D4ED8;
    --blue-50: #EFF6FF;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--page-bg);
    font-family: var(--tru-font-sans);
    color: var(--ink);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }

  /* ── App frame ─────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 64px 1fr;
    min-height: 100vh;
  }

  /* ── Sidebar ──────────────────────────────────────────── */
  .sidebar {
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 14px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .sidebar .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--tru-gradient);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 800; font-size: 15px;
    margin-bottom: 10px;
    box-shadow: var(--tru-shadow-blue);
  }
  .nav-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: transparent; border: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: all 160ms var(--tru-ease-out);
  }
  .nav-btn:hover { background: var(--tru-slate-100); color: var(--ink); }
  .nav-btn.active { background: var(--blue-50); color: var(--primary); }
  .nav-btn svg { width: 20px; height: 20px; }
  .sidebar .divider { width: 28px; height: 1px; background: var(--border); margin: 6px 0; }
  .sidebar .spacer { flex: 1; }

  /* ── Main column ──────────────────────────────────────── */
  .main {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .topbar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .crumbs {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 13px;
  }
  .crumbs b { color: var(--ink); font-weight: 600; }
  .crumbs .sep { color: var(--muted-2); }
  .topbar .spacer { flex: 1; }
  .chip-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 9999px; padding: 6px 14px;
    font-size: 12.5px; font-weight: 600; color: var(--ink-2);
    transition: border-color 150ms;
  }
  .chip-btn:hover { border-color: var(--tru-slate-300); }
  .chip-btn svg { width: 14px; height: 14px; }

  /* ── Content area ─────────────────────────────────────── */
  .content {
    padding: 20px 28px 40px;
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── Filter bar ───────────────────────────────────────── */
  .filter-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    box-shadow: 0 1px 2px rgba(15,23,42,0.03);
  }

  .primary-row {
    display: grid;
    grid-template-columns: auto 1.1fr 2.4fr auto auto;
    gap: 8px;
    align-items: stretch;
  }

  .search-mode {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 10px;
    height: 44px;
    color: var(--muted);
  }
  .search-mode .icn {
    width: 32px; height: 32px;
    border-radius: 8px; background: var(--tru-slate-100);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-2);
  }
  .search-mode .icn svg { width: 16px; height: 16px; }
  .search-mode .caret { color: var(--muted-2); }

  .dd {
    display: inline-flex; align-items: center; justify-content: space-between;
    gap: 10px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 12px;
    height: 44px;
    font-size: 13.5px;
    color: var(--ink-2);
    font-weight: 500;
    transition: border-color 150ms, box-shadow 150ms;
    width: 100%;
  }
  .dd:hover { border-color: var(--tru-slate-300); }
  .dd .label { display: inline-flex; align-items: center; gap: 8px; color: var(--ink-2); }
  .dd .label .hint { color: var(--muted); font-weight: 400; }
  .dd .caret { color: var(--muted-2); width: 14px; height: 14px; }
  .dd.ai .label { color: var(--muted); }

  .search-input {
    display: flex; align-items: center; gap: 10px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 14px;
    height: 44px;
    width: 100%;
  }
  .search-input input {
    flex: 1; border: 0; outline: 0; background: transparent;
    font-family: inherit; font-size: 13.5px; color: var(--ink);
  }
  .search-input input::placeholder { color: var(--muted-2); }

  .search-btn {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--tru-slate-100);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-2);
  }
  .search-btn:hover { background: var(--tru-slate-200); }
  .search-btn svg { width: 16px; height: 16px; }

  .type-dd { min-width: 140px; }

  /* Secondary filter row */
  .filter-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-top: 10px;
  }

  /* Checkboxed filters */
  .dd .cbox {
    width: 16px; height: 16px;
    border-radius: 3px;
    border: 1.5px solid var(--tru-slate-300);
    flex-shrink: 0;
  }
  .dd.has-info .info {
    width: 14px; height: 14px; color: var(--muted-2);
    flex-shrink: 0;
  }

  /* See more / fewer toggle */
  .see-toggle {
    display: flex; justify-content: center; align-items: center;
    margin: 14px 0 4px;
    position: relative;
  }
  .see-toggle::before {
    content: ''; position: absolute; left: 0; right: 0; top: 50%;
    height: 1px; background: var(--border-soft);
  }
  .see-toggle button {
    position: relative; z-index: 1;
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 9999px; padding: 6px 14px;
    font-size: 12.5px; font-weight: 600; color: var(--primary);
  }
  .see-toggle button:hover { background: var(--blue-50); }
  .see-toggle .bar { width: 10px; height: 1.5px; background: currentColor; border-radius: 2px; }

  /* Section */
  .filter-section { padding-top: 14px; }
  .filter-section + .filter-section { margin-top: 4px; }
  .section-label {
    font-size: 10.5px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted-2);
    margin: 0 0 10px 2px;
  }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .grid-4 + .grid-4, .grid-4 + .grid-5, .grid-5 + .grid-4 { margin-top: 8px; }

  /* Creator has row (social icons) */
  .has-row {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--border-soft);
  }
  .has-row .label {
    font-size: 10.5px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted-2);
    margin-bottom: 10px;
  }
  .platform-row {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .platform-btn {
    width: 38px; height: 38px; border-radius: 8px;
    background: #fff; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-2);
    transition: all 150ms;
  }
  .platform-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--blue-50); }
  .platform-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .platform-btn svg { width: 16px; height: 16px; }
  .more-btn {
    padding: 0 14px;
    height: 38px;
    border-radius: 8px;
    background: #fff; border: 1px solid var(--border);
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--ink-2);
  }
  .more-btn:hover { border-color: var(--tru-slate-300); }

  /* Save row */
  .save-row {
    display: flex; gap: 10px;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--border-soft);
  }
  .btn-save {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--tru-slate-400); color: #fff;
    border: 0; border-radius: 8px;
    padding: 9px 16px;
    font-size: 13px; font-weight: 600;
  }
  .btn-save:hover { background: var(--tru-slate-500); }
  .btn-preset {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff; color: var(--ink-2);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 16px;
    font-size: 13px; font-weight: 600;
  }
  .btn-preset:hover { background: var(--tru-slate-50); }
  .icon-sm { width: 14px; height: 14px; }

  /* ── Results card ─────────────────────────────────────── */
  .results-card {
    margin-top: 20px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 1px 2px rgba(15,23,42,0.03);
    overflow: hidden;
  }
  .results-head {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border-soft);
  }
  .count-pill {
    background: var(--tru-slate-100);
    border-radius: 9999px;
    padding: 6px 14px;
    font-size: 13px;
  }
  .count-pill b { color: var(--ink); font-weight: 700; }
  .count-pill .muted { color: var(--muted); font-weight: 500; }
  .sort-dd {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent; border: 0;
    color: var(--muted); font-size: 13px; font-weight: 500;
    padding: 6px 10px; border-radius: 8px;
  }
  .sort-dd:hover { background: var(--tru-slate-50); }
  .sort-dd b { color: var(--primary); font-weight: 600; }
  .sort-dd svg { width: 12px; height: 12px; color: var(--primary); }
  .results-head .spacer { flex: 1; }
  .menu-btn {
    width: 34px; height: 34px; border-radius: 8px;
    background: transparent; border: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
  }
  .menu-btn:hover { background: var(--tru-slate-100); color: var(--ink); }
  .btn-export {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--primary); color: #fff;
    border: 0; border-radius: 8px;
    padding: 9px 16px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 1px 2px rgba(37,99,235,0.25);
  }
  .btn-export:hover { background: var(--tru-blue-700); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table.results {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  table.results thead th {
    text-align: left;
    font-weight: 600;
    color: var(--muted);
    font-size: 12.5px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border-soft);
    white-space: nowrap;
    background: #fff;
  }
  table.results thead th.right { text-align: right; }
  table.results thead th.center { text-align: center; }
  table.results tbody td {
    padding: 18px 14px;
    border-bottom: 1px solid var(--border-soft);
    vertical-align: middle;
  }
  table.results tbody tr:hover { background: #FAFBFD; }
  table.results tbody tr:last-child td { border-bottom: 0; }

  .check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--tru-slate-300);
    border-radius: 3px;
    display: inline-block;
  }
  .th-select { width: 52px; padding-left: 18px !important; }

  .creator { display: flex; align-items: center; gap: 12px; min-width: 260px; }
  .creator .check { margin-right: 2px; flex-shrink: 0; }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 14px;
    flex-shrink: 0;
    box-shadow: inset 0 0 0 2px #fff;
  }
  .creator-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .creator-name {
    display: flex; align-items: center; gap: 4px;
    font-weight: 600; color: var(--ink); font-size: 14px;
  }
  .verified { width: 14px; height: 14px; color: var(--primary); flex-shrink: 0; }
  .creator-loc { color: var(--muted); font-size: 12.5px; }

  .social-cell { text-align: center; }
  .social-icon {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink-2);
  }
  .email-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink-2);
  }
  .email-icon svg { width: 16px; height: 16px; }

  .num { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--ink); }
  .er { font-variant-numeric: tabular-nums; color: var(--ink-2); font-weight: 500; }

  .growth-cell { display: flex; align-items: center; gap: 8px; }
  .spark { width: 54px; height: 18px; display: block; }
  .growth-val { font-variant-numeric: tabular-nums; font-size: 12.5px; font-weight: 600; }
  .growth-val.pos { color: #059669; }
  .growth-val.neg { color: #DC2626; }
  .growth-val.flat { color: var(--muted); }

  .link-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 9999px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--ink-2);
    font-weight: 500;
  }
  .link-chip svg { width: 11px; height: 11px; color: var(--muted); }

  .tags { display: flex; gap: 6px; flex-wrap: nowrap; min-width: 0; }
  .tag {
    display: inline-flex; align-items: center;
    border: 1px solid var(--border);
    border-radius: 9999px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--ink-2);
    font-weight: 500;
    max-width: 110px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .tag.more { color: var(--muted); }

  /* Unlock row */
  .unlock-row {
    padding: 16px 18px 20px;
    text-align: center;
    border-top: 1px solid var(--border-soft);
  }
  .unlock-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 9999px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary);
  }
  .unlock-btn:hover { background: var(--blue-50); border-color: var(--primary); }
  .unlock-note { margin-top: 8px; font-size: 12px; color: var(--muted); }

  /* Locked preview row */
  .locked td { filter: blur(3px); opacity: 0.55; pointer-events: none; user-select: none; }
  .locked .check { filter: none; }
</style>
</head>
<body>

<script>
  /* ── Data ──────────────────────────────────────────── */
  const CREATORS = [
    { name: 'John Harris',     loc: 'United States',               verified: true,  platform: 'ig', followers: '119.2K', er: '0.94%',  growth: '+0.57%',  growthDir: 'up',   links: 2,  tags: ['#5percentnu...', '#loveitkill...'], more: 8,  avatarColor: '#7C3AED' },
    { name: 'ElifVolkanOkay',  loc: 'United States',               verified: false, platform: 'ig', followers: '129.3K', er: '3.44%',  growth: '—',       growthDir: 'flat', links: 24, tags: ['#juryinspir...', '#baginbag'], more: 8, avatarColor: '#F59E0B' },
    { name: 'Vicente Gutierrez', loc: 'Berlin, Germany',           verified: true,  platform: 'ig', followers: '92.3K',  er: '0.01%',  growth: '-1.53%',  growthDir: 'down', links: 1,  tags: ['#instagramt...', '#instagramg...'], more: 8, avatarColor: '#0F172A' },
    { name: 'Laura Dawson',    loc: 'United Kingdom',              verified: true,  platform: 'ig', followers: '10.3K',  er: '5.84%',  growth: '+2.58%',  growthDir: 'up',   links: 1,  tags: ['#dubai', '#shein'], more: 8, avatarColor: '#EC4899' },
    { name: 'Hari',            loc: 'Queens, New York, United States', verified: false, platform: 'ig', followers: '510.5K', er: '0.10%', growth: '+26.82%', growthDir: 'up', links: 1, tags: [], more: 0, avatarColor: '#2563EB' },
  ];

  const LOCKED = [
    { name: 'Megan Wain', loc: '', verified: true, platform: 'ig', followers: '250K', er: '3.5%', growth: '+1.2%', growthDir: 'up', links: 10, tags: ['#fitness', '#sports', '#coach'], more: 0, avatarColor: '#0EA5E9' },
  ];

  function initials(name) {
    return name.split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
  }

  function sparklinePath(dir) {
    if (dir === 'flat') return null;
    if (dir === 'up')   return { d: 'M2 14 L10 12 L18 13 L26 9 L34 8 L42 5 L50 3', color: '#059669' };
    if (dir === 'down') return { d: 'M2 5 L10 7 L18 6 L26 10 L34 11 L42 13 L50 15', color: '#DC2626' };
    return null;
  }

  function renderRow(c, locked = false) {
    const sp = sparklinePath(c.growthDir);
    const spark = c.growthDir === 'flat'
      ? '<span style="color:var(--muted);font-size:16px;line-height:1;">—</span>'
      : sp ? `<svg class="spark" viewBox="0 0 52 18" fill="none"><path d="${sp.d}" stroke="${sp.color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>` : '';

    const growthCls = c.growthDir === 'up' ? 'pos' : c.growthDir === 'down' ? 'neg' : 'flat';
    const growthTxt = c.growth !== '—' ? `<span class="growth-val ${growthCls}">${c.growth}</span>` : '';

    const tagsHtml = c.tags.length
      ? `<div class="tags">${c.tags.map(t => `<span class="tag">${t}</span>`).join('')}${c.more ? `<span class="tag more">+${c.more}</span>` : ''}</div>`
      : '';

    return `
      <tr class="${locked ? 'locked' : ''}">
        <td class="th-select"><span class="check"></span></td>
        <td>
          <div class="creator">
            <div class="avatar" style="background:${c.avatarColor}">${initials(c.name)}</div>
            <div class="creator-info">
              <div class="creator-name">${c.name}${c.verified ? '<svg class="verified"><use href="#i-verified"/></svg>' : ''}</div>
              ${c.loc ? `<div class="creator-loc">${c.loc}</div>` : ''}
            </div>
          </div>
        </td>
        <td class="social-cell"><span class="social-icon"><svg width="16" height="16"><use href="#p-${c.platform}"/></svg></span></td>
        <td><span class="num">${c.followers}</span></td>
        <td><span class="email-icon"><svg><use href="#i-mail"/></svg></span></td>
        <td><span class="er">${c.er}</span></td>
        <td><div class="growth-cell">${spark}${growthTxt}</div></td>
        <td><span class="link-chip"><svg><use href="#i-link"/></svg>${c.links}</span></td>
        <td>${tagsHtml}</td>
      </tr>
    `;
  }

  const body = document.getElementById('results-body');
  body.innerHTML = CREATORS.map(c => renderRow(c)).join('') + LOCKED.map(c => renderRow(c, true)).join('');

  /* ── See more / fewer toggle ──────────────────────── */
  const toggle = document.getElementById('see-toggle');
  const advanced = document.getElementById('advanced');
  let expanded = true;
  toggle.addEventListener('click', () => {
    expanded = !expanded;
    advanced.style.display = expanded ? '' : 'none';
    toggle.querySelector('span:first-child').textContent = expanded ? 'See fewer' : 'See more';
  });

  /* ── Platform button toggle ───────────────────────── */
  document.querySelectorAll('.platform-btn').forEach(btn => {
    btn.addEventListener('click', () => btn.classList.toggle('active'));
  });

  /* ── Row check toggle ─────────────────────────────── */
  document.querySelectorAll('.check').forEach(c => {
    c.addEventListener('click', (e) => {
      e.stopPropagation();
      const checked = c.style.background === 'var(--primary)';
      if (checked) {
        c.style.background = '';
        c.style.borderColor = '';
      } else {
        c.style.background = 'var(--primary)';
        c.style.borderColor = 'var(--primary)';
      }
    });
  });
</script>
